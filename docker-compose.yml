version: "3.9"

services:
  aiforge:
    build: .
    container_name: aiforge_dashboard
    ports:
      - "8501:8501"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_ORG=${GITHUB_ORG}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - APP_ENV=production
    volumes:
      # Persist the database between container restarts
      - aiforge_db:/app/database
      - aiforge_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  aiforge_db:
  aiforge_data:
